{% extends "base.html" %}
{% block title %}Register your shop — localConnect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card p-4">
      <h3 class="section-title mb-1">Register your shop</h3>
      <p class="text-muted">Get discovered by customers searching for products you stock.</p>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Shop name</label>
            <input class="form-control" name="name" required></div>
          <div class="col-md-6"><label class="form-label">Owner name</label>
            <input class="form-control" name="owner_name" value="{{ current_user.name }}"></div>
          <div class="col-md-6"><label class="form-label">Mobile number</label>
            <input class="form-control" name="mobile"></div>
          <div class="col-md-6"><label class="form-label">Category</label>
            <select class="form-select" name="category">
              {% for c in categories %}<option>{{ c }}</option>{% endfor %}</select></div>
          <div class="col-12"><label class="form-label">Address</label>
            <input class="form-control" name="address"></div>
          <div class="col-md-5"><label class="form-label">GPS Latitude</label>
            <input class="form-control" id="lat" name="lat" placeholder="12.9716"></div>
          <div class="col-md-5"><label class="form-label">GPS Longitude</label>
            <input class="form-control" id="lng" name="lng" placeholder="77.5946"></div>
          <div class="col-md-2 d-flex align-items-end">
            <button type="button" class="btn btn-outline-primary w-100"
                    onclick="pickMyCoords('lat','lng')"><i class="bi bi-crosshair"></i></button></div>
          <div class="col-md-6">
            <div class="form-check mt-2"><input class="form-check-input" type="checkbox" name="delivery_available" id="da">
              <label class="form-check-label" for="da">Delivery available</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" name="parking" id="pk">
              <label class="form-check-label" for="pk">Parking available</label></div>
          </div>
          <div class="col-md-6"><label class="form-label">Delivery radius (km)</label>
            <input class="form-control" type="number" step="0.5" name="delivery_radius" value="3"></div>
        </div>
        <button class="btn btn-warning fw-bold w-100 mt-4">Submit for verification</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
