{% extends "base.html" %}
{% block title %}Sign up — localConnect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="section-title mb-1">Create your account</h3>
      <p class="text-muted">Join as a customer to shop, or as a shop owner to sell.</p>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Full name</label>
            <input class="form-control" name="name" required></div>
          <div class="col-md-6"><label class="form-label">Mobile</label>
            <input class="form-control" name="phone"></div>
          <div class="col-md-6"><label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required></div>
          <div class="col-md-6"><label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required></div>
          <div class="col-12">
            <label class="form-label">I am a…</label>
            <select class="form-select" name="role">
              <option value="customer">Customer — find & buy products</option>
              <option value="owner">Shop Owner — list my shop & products</option>
            </select>
          </div>
        </div>
        <button class="btn btn-warning fw-bold w-100 mt-4">Create account</button>
      </form>
      <div class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
    </div>
  </div>
</div>
{% endblock %}
